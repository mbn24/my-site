<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حساب معدل الإعلام الآلي</title>
    <style>
        /* هنا نكتب الـ CSS لتلوين الواجهة وتنسيقها */
        body {
            font-family: Arial, sans-serif;
            background-color: #070745;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #252538;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .subject-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1e1e2e;
            color: white;
        }
        button {
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        button:hover {
            background-color: #5c6bc0;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>💻 حساب المعدل  💻</h2>
        <p>أدخل العلامات والمعاملات لتجربة الواجهة:</p>
        
        <div id="subjects">
            <div class="subject-row">
                <input type="text" value="Algorithmics 1" disabled>
                <input type="number" class="coeff" value="4" placeholder="المعامل">
                <input type="number" class="mark" placeholder="العلامة من 20">
            </div>
            <div class="subject-row">
                <input type="text" value="Analysis 1" disabled>
                <input type="number" class="coeff" value="4" placeholder="المعامل">
                <input type="number" class="mark" placeholder="العلامة من 20">
            </div>
        </div>

        <button onclick="calculateGPA()">احسب المعدل</button>
        <div id="result"></div>
    </div>

    <script>
        // هنا نكتب الـ JavaScript المسؤول عن منطق الحساب
        async function calculateGPA() {
    let marksElements = document.querySelectorAll('.mark');
    let coeffsElements = document.querySelectorAll('.coeff');
    
    let marks = [];
    let coeffs = [];
    let hasError = false;

    // تجميع البيانات من الخانات
    for (let i = 0; i < marksElements.length; i++) {
        if (marksElements[i].value === "") {
            hasError = true;
            break;
        }
        marks.push(marksElements[i].value);
        coeffs.push(coeffsElements[i].value);
    }

    let resultDiv = document.getElementById('result');
    if (hasError) {
        resultDiv.innerHTML = "❌ يرجى ملء جميع الخانات أولاً!";
        resultDiv.style.color = "red";
        return;
    }

    try {
        // إرسال البيانات إلى كود بايثون الفلاسك الخلفي
        let response = await fetch('http://127.0.0.1:5000/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ marks: marks, coeffs: coeffs })
        });

        let result = await response.json();
        
        // عرض النتيجة القادمة من بايثون مباشرة على الواجهة
        if (response.ok) {
            resultDiv.innerHTML = `المعدل الإجمالي: ${result.gpa} <br> الحالة: ${result.status}`;
            resultDiv.style.color = result.gpa >= 10 ? "green" : "red";
        } else {
            resultDiv.innerHTML = `❌ ${result.error}`;
            resultDiv.style.color = "red";
        }
    } catch (err) {
        resultDiv.innerHTML = "❌ تأكد من تشغيل ملف بايثون app.py أولاً!";
        resultDiv.style.color = "orange";
    }
}
    </script>
</body>
</html>
